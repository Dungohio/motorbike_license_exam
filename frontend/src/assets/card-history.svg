    <circle r="30" fill="#2a9d8f"/>
    <circle r="24" fill="#ffffff"/>
    <path d="M-10 0 L -3 8 L 12 -9" stroke="#2a9d8f" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
