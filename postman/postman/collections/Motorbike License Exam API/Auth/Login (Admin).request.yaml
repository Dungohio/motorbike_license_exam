$kind: http-request
description: |-
  Đăng nhập bằng tài khoản admin (tạo sẵn khi seed).

  **Token trả về được tự lưu vào biến {{token}}** nhờ script ở tab Scripts.

  **Trả về:** thông tin user + JWT token. Tài khoản bị khóa sẽ nhận 403.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@example.com",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      var data = pm.response.json();
      if (data.token) { pm.environment.set('token', data.token); }
    language: text/javascript
examples: ./.resources/Login (Admin).resources/examples
order: 2000
