$kind: http-request
description: Đăng nhập bằng tài khoản user thường (tạo sẵn khi seed). Token tự lưu vào {{token}}.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "user@example.com",
      "password": "user123"
    }
scripts:
  - type: afterResponse
    code: |-
      var data = pm.response.json();
      if (data.token) { pm.environment.set('token', data.token); }
    language: text/javascript
examples: ./.resources/Login (User).resources/examples
order: 3000
