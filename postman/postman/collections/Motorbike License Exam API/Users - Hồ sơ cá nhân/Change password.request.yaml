$kind: http-request
description: |-
  Đổi mật khẩu: phải nhập đúng mật khẩu cũ, mật khẩu mới ≥6 ký tự.

  **Trả về:** thông báo thành công. Sai mật khẩu cũ nhận 401.
url: "{{baseUrl}}/users/me/password"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "oldPassword": "user123",
      "newPassword": "newpass123"
    }
examples: ./.resources/Change password.resources/examples
order: 2000
