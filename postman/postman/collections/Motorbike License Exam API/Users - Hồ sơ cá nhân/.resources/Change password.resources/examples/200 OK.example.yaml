$kind: http-example
request:
  url: "{{baseUrl}}/users/me/password"
  method: PUT
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: text
    content: |-
      {
        "oldPassword": "user123",
        "newPassword": "newpass123"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Đổi mật khẩu thành công"
      }
order: 1000
