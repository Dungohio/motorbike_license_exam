$kind: http-example
request:
  url: "{{baseUrl}}/users/me"
  method: PUT
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: text
    content: |-
      {
        "name": "Tên mới",
        "avatar": "avatar3"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "_id": "665f1a2b3c4d5e6f7a8b9c0d",
          "name": "Tên mới",
          "email": "user@example.com",
          "role": "user",
          "avatar": "avatar3",
          "isLocked": false,
          "createdAt": "2026-07-09T03:00:00.000Z",
          "updatedAt": "2026-07-09T03:00:00.000Z"
        }
      }
order: 1000
