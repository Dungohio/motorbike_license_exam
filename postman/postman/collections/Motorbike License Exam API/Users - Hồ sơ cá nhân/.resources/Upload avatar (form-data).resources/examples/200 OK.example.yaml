$kind: http-example
request:
  url: "{{baseUrl}}/users/me/avatar"
  method: POST
  headers:
    Authorization: Bearer {{token}}
  body:
    type: formdata
    content:
      - type: file
        key: avatar
        src:
          - ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "_id": "665f1a2b3c4d5e6f7a8b9c0d",
          "name": "Người dùng mẫu",
          "email": "user@example.com",
          "role": "user",
          "avatar": "/uploads/avatar-665f1a2b-1783712251200.png",
          "isLocked": false,
          "createdAt": "2026-07-09T03:00:00.000Z",
          "updatedAt": "2026-07-09T03:00:00.000Z"
        }
      }
order: 1000
