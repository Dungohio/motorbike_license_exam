$kind: http-example
request:
  url: "{{baseUrl}}/users/:id"
  method: DELETE
  headers:
    Authorization: Bearer {{token}}
  pathVariables:
    id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Đã xóa tài khoản và lịch sử thi liên quan"
      }
order: 1000
