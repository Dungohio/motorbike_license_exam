$kind: http-example
request:
  url: "{{baseUrl}}/categories/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  pathVariables:
    id: ""
  body:
    type: text
    content: |-
      {
        "name": "Tên chủ đề mới"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "_id": "665f1a2b3c4d5e6f7a8b9c0d",
        "name": "Tên chủ đề mới",
        "slug": "ten-chu-de-moi",
        "description": "Nhận biết ý nghĩa các biển báo hiệu đường bộ."
      }
order: 1000
