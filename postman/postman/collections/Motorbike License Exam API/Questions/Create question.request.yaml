$kind: http-request
description: |-
  Thêm câu hỏi mới (chỉ admin). `correctIndex` là chỉ số (từ 0) của đáp án đúng trong `options` (tối thiểu 2 đáp án). `isCritical: true` = câu điểm liệt.

  **Trả về:** câu hỏi vừa tạo.
url: "{{baseUrl}}/questions"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "licenseClass": "<licenseClassId>",
      "category": "<categoryId>",
      "content": "Câu hỏi mẫu?",
      "imageUrl": "",
      "options": [
        "Đáp án A",
        "Đáp án B",
        "Đáp án C"
      ],
      "correctIndex": 0,
      "explanation": "Giải thích...",
      "isCritical": false
    }
examples: ./.resources/Create question.resources/examples
order: 4000
