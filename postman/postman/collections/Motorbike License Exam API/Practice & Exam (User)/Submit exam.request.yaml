$kind: http-request
url: "{{baseUrl}}/exams/submit"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "licenseClass": "<licenseClassId>",
      "startedAt": "2026-07-09T00:00:00.000Z",
      "durationSeconds": 300,
      "answers": [
        { "question": "<questionId>", "selectedIndex": 0 }
      ]
    }
order: 3000
